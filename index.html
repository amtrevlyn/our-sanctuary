<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Sanctuary | Wahyu & Rinol 🌸</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        :root { --pink: #ff85a2; --soft-pink: #ffdae0; --matcha: #aed581; --deep-pink: #ef476f; --online: #2ecc71; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #fff0f3, #f0fff4); margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        
        .container { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); padding: 20px; width: 100%; max-width: 400px; min-height: 100vh; position: relative; padding-bottom: 80px; box-sizing: border-box; }

        /* --- NAVIGATION --- */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 400px; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid var(--soft-pink); z-index: 100; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .nav-item { cursor: pointer; font-size: 1.2rem; color: #888; transition: 0.3s; display: flex; flex-direction: column; align-items: center; font-weight: bold; flex: 1; }
        .nav-item.active { color: var(--deep-pink); transform: translateY(-5px); }
        .nav-label { font-size: 0.6rem; margin-top: 4px; }

        /* --- MUSIC PLAYER FLOATING --- */
        #music-btn { position: fixed; bottom: 85px; right: 20px; width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 99; cursor: pointer; border: 2px solid var(--soft-pink); font-size: 1.2rem; transition: 0.3s; }
        .playing { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- SECTIONS --- */
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- UI COMPONENTS --- */
        .main-title { text-align: center; color: var(--deep-pink); font-family: 'Georgia', serif; margin-bottom: 20px; font-size: 1.5rem; }
        .status-card { background: white; border-radius: 25px; padding: 15px; margin-bottom: 15px; border: 2px solid var(--soft-pink); text-align: center; }
        .online-dot { height: 8px; width: 8px; background-color: #ccc; border-radius: 50%; display: inline-block; }
        .dot-active { background-color: var(--online); box-shadow: 0 0 8px var(--online); }
        
        #chat-box { height: 350px; overflow-y: auto; padding: 10px; border-radius: 20px; background: #fffcfd; display: flex; flex-direction: column; gap: 10px; border: 1px solid #f0f0f0; }
        .msg { padding: 10px 15px; border-radius: 20px; font-size: 0.85rem; max-width: 85%; position: relative; cursor: pointer; }
        .msg.wahyu { align-self: flex-start; background: #ffeaef; color: #7a3e4d; border-bottom-left-radius: 2px; }
        .msg.rinol { align-self: flex-end; background: #f0f9f1; color: #3e5d40; border-bottom-right-radius: 2px; }
        .msg.system { align-self: center; background: #fff2f5; color: var(--deep-pink); font-size: 0.7rem; border: 1px dashed var(--pink); width: 90%; text-align: center; }
        
        .reply-box { font-size: 0.7rem; background: rgba(0,0,0,0.05); padding: 5px 8px; border-radius: 10px; border-left: 3px solid var(--pink); margin-bottom: 5px; color: #666; font-style: italic; }
        #reply-preview { background: #f0f0f0; padding: 10px; border-radius: 15px; margin-bottom: 10px; display: none; position: relative; border-left: 5px solid var(--pink); font-size: 0.75rem; }

        /* --- GALLERY STYLE --- */
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .photo-card { background: white; border-radius: 15px; padding: 5px; border: 1px solid var(--soft-pink); box-shadow: 0 3px 6px rgba(0,0,0,0.05); }
        .photo-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; cursor: pointer; }
        .photo-info { font-size: 0.6rem; text-align: center; margin-top: 5px; color: #888; }

        .heart-rain { position: fixed; top: -20px; font-size: 20px; z-index: 9998; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
        #game-canvas { width: 100%; height: 300px; background: #fff; border-radius: 20px; border: 2px solid var(--soft-pink); touch-action: none; }
        .btn { border: none; border-radius: 20px; padding: 15px; color: white; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>

<audio id="mySong" loop>
    <source src="glue.mp3" type="audio/mpeg">
</audio>

<div id="lock-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#ffc2d1; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center;">
    <div style="background:white; padding:35px; border-radius:40px; text-align:center; width:85%; max-width:320px;">
        <h3 style="color:var(--deep-pink)">Digital Sanctuary 🗝️</h3>
        <p style="font-size:0.75rem; color:#888;">Hint: Anniversary kita (14022026)</p>
        <input type="password" id="pass-input" placeholder="********" inputmode="numeric" style="width:100%; padding:15px; border-radius:20px; border:2px solid #eee; text-align:center; font-size:1.2rem; outline:none;">
        <button class="btn" style="background:var(--pink); margin-top:15px;" onclick="checkPass()">Buka ❤️</button>
    </div>
</div>

<div id="music-btn" onclick="toggleMusic()">🎵</div>

<div class="container">
    <div id="sec-home" class="section active">
        <h2 class="main-title">Our Digital Sanctuary 🏠</h2>
        
        <div class="status-card">
            <div style="display:flex; justify-content:space-around; font-size: 0.65rem;">
                <div><span class="online-dot" id="dot-wahyu"></span> Wahyu<br><b id="clock-wahyu">00:00:00</b><br><small>Morowali Utara</small></div>
                <div><span class="online-dot" id="dot-rinol"></span> Rinol<br><b id="clock-rinol">00:00:00</b><br><small>Berau</small></div>
            </div>
        </div>

        <div id="pinned-area" style="background:#fff5f7; border:1px dashed var(--pink); padding:8px; border-radius:15px; margin-bottom:10px; font-size:0.7rem; display:none; text-align:center;" onclick="unpinMessage()">📌 <span id="pin-text"></span></div>
        
        <select id="user-role" onchange="updateOnlineStatus()" style="width:100%; padding:10px; border-radius:15px; margin-bottom:10px; border:1px solid var(--soft-pink); outline:none; background:white;">
            <option value="Wahyu">Wahyu</option>
            <option value="Rinol">Rinol</option>
        </select>

        <div id="chat-box"></div>

        <div id="reply-preview">
            <span onclick="cancelReply()" style="position:absolute; right:10px; top:5px; cursor:pointer; font-weight:bold;">×</span>
            <div id="reply-target-name" style="font-weight:bold; color:var(--pink); font-size:0.6rem;"></div>
            <div id="reply-target-text" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
        </div>

        <div style="display:flex; gap:5px; margin-top:10px;">
            <input type="text" id="msg-input" style="flex:1; border-radius:20px; border:1.5px solid #eee; padding:12px; outline:none;" placeholder="Ketik pesan...">
            <button class="btn" style="background:var(--pink); width:60px; margin:0;" onclick="sendMessage()">✨</button>
        </div>
    </div>

    <div id="sec-gallery" class="section">
        <h3 style="text-align:center; color:var(--deep-pink)">📸 Our Memories</h3>
        <button class="btn" style="background:var(--pink);" id="upload-btn">Upload Foto Baru 🖼️</button>
        <div id="gallery-container" class="gallery-grid">
            </div>
    </div>

    <div id="sec-game" class="section">
        <h3 style="text-align:center; color:var(--deep-pink)">🎮 Game Center</h3>
        <div class="status-card">Skor: <span id="current-score" style="font-weight:bold; color:var(--deep-pink)">0</span> | Waktu: <span id="game-timer">30</span>s</div>
        <canvas id="game-canvas"></canvas>
        <button id="start-game-btn" class="btn" style="background:var(--matcha); margin-top:10px;" onclick="toggleGame()">Mulai Main</button>
        <button id="share-score-btn" class="btn" style="background:var(--pink); display:none;" onclick="shareScore()">📤 Pamer Skor ke Chat</button>
    </div>

    <div id="sec-love" class="section">
        <h3 style="text-align:center; color:var(--deep-pink)">✨ Love Actions</h3>
        <div class="status-card" style="background:var(--pink); color:white;">✈️ Menuju Berau:<br><b id="timer-full">00:00:00</b></div>
        <button class="btn" style="background:#bde0fe; color:#457b9d;" onclick="sendQuote()">📜 Pesan Manis Acak</button>
        <button class="btn" style="background:var(--soft-pink); color:var(--deep-pink); border:2px solid var(--pink);" onclick="startLoveRain('Peluk Hangat... 🫂')">🫂 Beri Pelukan</button>
        <button class="btn" style="background:var(--pink);" onclick="sendQuick('Aku Kangen Banget! 🥺')">🥺 Bilang Kangen</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showSection('sec-home', this)">🏠<span class="nav-label">Home</span></div>
        <div class="nav-item" onclick="showSection('sec-gallery', this)">📸<span class="nav-label">Gallery</span></div>
        <div class="nav-item" onclick="showSection('sec-game', this)">🎮<span class="nav-label">Game</span></div>
        <div class="nav-item" onclick="showSection('sec-love', this)">✨<span class="nav-label">Love</span></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCTR3QhEHG4lgU_1N4RWNDIZ_GCb5FUw_Q", authDomain: "yurin-e2687.firebaseapp.com", databaseURL: "https://yurin-e2687-default-rtdb.firebaseio.com", projectId: "yurin-e2687", storageBucket: "yurin-e2687.firebasestorage.app", messagingSenderId: "105255547339", appId: "1:105255547339:web:5e6a3f53a5c8056000064e" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // --- CLOUDINARY CONFIG ---
    const cloudName = "deuuml0fs";
    const uploadPreset = "yurin_preset"; // Buat preset ini di Cloudinary (Unsigned)

    const myWidget = cloudinary.createUploadWidget({
        cloudName: cloudName, 
        uploadPreset: uploadPreset,
        cropping: true,
        multiple: false,
        clientAllowedFormats: ["png", "jpg", "jpeg"]
    }, (error, result) => { 
        if (!error && result && result.event === "success") { 
            const photoData = {
                url: result.info.secure_url,
                sender: document.getElementById('user-role').value,
                timestamp: Date.now()
            };
            database.ref('gallery').push().set(photoData);
        }
    });

    document.getElementById("upload-btn").addEventListener("click", function(){
        myWidget.open();
    }, false);

    // Sync Gallery
    database.ref('gallery').orderByChild('timestamp').on('value', snap => {
        const container = document.getElementById('gallery-container');
        container.innerHTML = "";
        let photos = [];
        snap.forEach(child => { photos.unshift(child.val()); });
        photos.forEach(d => {
            const div = document.createElement('div');
            div.className = 'photo-card';
            div.innerHTML = `<img src="${d.url}" onclick="window.open('${d.url}', '_blank')"><div class="photo-info">Oleh: ${d.sender}</div>`;
            container.appendChild(div);
        });
    });

    // --- MUSIC LOGIC ---
    const song = document.getElementById("mySong");
    const musicBtn = document.getElementById("music-btn");
    function toggleMusic() {
        if(song.paused) { song.play(); musicBtn.classList.add("playing"); musicBtn.innerHTML = "🎶"; }
        else { song.pause(); musicBtn.classList.remove("playing"); musicBtn.innerHTML = "🎵"; }
    }

    function checkPass() { 
        if(document.getElementById('pass-input').value === "14022026") {
            document.getElementById('lock-screen').style.display = "none"; 
            updateOnlineStatus();
            toggleMusic();
        } 
    }

    let replyData = null;

    function showSection(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function updateOnlineStatus() { const r = document.getElementById('user-role').value; database.ref('presence/'+r).set(true); database.ref('presence/'+r).onDisconnect().set(false); }
    database.ref('presence/Wahyu').on('value', s => document.getElementById('dot-wahyu').className = s.val() ? 'online-dot dot-active' : 'online-dot');
    database.ref('presence/Rinol').on('value', s => document.getElementById('dot-rinol').className = s.val() ? 'online-dot dot-active' : 'online-dot');

    function pinMessage(t) { database.ref("pinned").set({ text: t }); }
    function unpinMessage() { database.ref("pinned").remove(); }
    database.ref("pinned").on("value", s => { const a = document.getElementById('pinned-area'); if(s.exists()){ a.style.display="block"; document.getElementById('pin-text').innerText=s.val().text; } else a.style.display="none"; });

    function setReply(sender, text) {
        replyData = { sender, text };
        document.getElementById('reply-preview').style.display = 'block';
        document.getElementById('reply-target-name').innerText = `Membalas ${sender}`;
        document.getElementById('reply-target-text').innerText = text;
        document.getElementById('msg-input').focus();
    }
    function cancelReply() { replyData = null; document.getElementById('reply-preview').style.display = 'none'; }

    function sendMessage() {
        const u = document.getElementById('user-role').value, t = document.getElementById('msg-input').value;
        if(!t.trim()) return;
        const jam = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Makassar' });
        const data = { sender: u, text: t, time: jam };
        if(replyData) { data.replyTo = replyData.text; data.replyFrom = replyData.sender; }
        database.ref("messages").push().set(data);
        document.getElementById('msg-input').value = ""; cancelReply();
    }

    function sendQuick(t) { database.ref("messages").push().set({ sender: "SISTEM", text: `💖 ${document.getElementById('user-role').value}: ${t}`, type: 'system' }); }
    function sendQuote() { const k = ["Kamu adalah pelabuhan terakhirku. 🏠", "Jarak ini hanyalah ujian kesabaran kita. 💍", "Nggak sabar mau peluk beneran di Berau! 🫂"]; sendQuick(k[Math.floor(Math.random()*k.length)]); }

    function startLoveRain(text) {
        sendQuick(text);
        for(let i=0; i<30; i++) {
            setTimeout(() => {
                const h = document.createElement('div'); h.className = 'heart-rain'; h.innerHTML = '❤️';
                h.style.left = Math.random() * 100 + 'vw'; h.style.animationDuration = (Math.random()*2+2)+'s';
                document.body.appendChild(h); setTimeout(() => h.remove(), 4000);
            }, i * 150);
        }
    }

    database.ref("messages").on("value", snap => {
        const box = document.getElementById('chat-box'); box.innerHTML = "";
        snap.forEach(c => {
            const d = c.val(), div = document.createElement("div");
            div.className = `msg ${d.sender.toLowerCase().split(' ')[0]} ${d.type||''}`;
            if(d.type === 'system') div.innerText = d.text;
            else {
                let html = `<div style="font-size:0.5rem; font-weight:bold; opacity:0.7; margin-bottom:3px; display:flex; justify-content:space-between;"><span>${d.sender}</span><span onclick="event.stopPropagation(); pinMessage('${d.text}')">📌</span></div>`;
                if(d.replyTo) html += `<div class="reply-box">💬 ${d.replyTo}</div>`;
                html += `<div>${d.text}</div><div style="font-size:0.5rem; text-align:right; margin-top:3px; opacity:0.6;">${d.time||''}</div>`;
                div.innerHTML = html;
                div.onclick = () => setReply(d.sender, d.text);
            }
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });

    const canvas = document.getElementById('game-canvas'), ctx = canvas.getContext('2d');
    let gameOn = false, score = 0, basketX = 150, hearts = [], timeLeft = 30, gameInt;
    function toggleGame() {
        if(gameOn) return; gameOn = true; timeLeft = 30; score = 0; hearts = [];
        document.getElementById('start-game-btn').style.display = 'none';
        document.getElementById('share-score-btn').style.display = 'none';
        canvas.width = canvas.offsetWidth; canvas.height = 300;
        gameInt = setInterval(() => { timeLeft--; document.getElementById('game-timer').innerText = timeLeft; if(timeLeft <= 0) endGame(); }, 1000);
        requestAnimationFrame(gameLoop);
    }
    function endGame() { gameOn = false; clearInterval(gameInt); document.getElementById('start-game-btn').style.display = 'block'; document.getElementById('share-score-btn').style.display = 'block'; }
    function gameLoop() {
        if(!gameOn) return; ctx.clearRect(0,0,canvas.width,canvas.height); ctx.font="40px Arial"; ctx.fillText("🐱", basketX-20, 280);
        if(Math.random()<0.05) hearts.push({x: Math.random()*(canvas.width-30), y:0});
        hearts.forEach((h,i) => { h.y+=4; ctx.fillText("❤️", h.x, h.y); if(h.y>250 && h.y<290 && Math.abs(h.x-(basketX-10))<40){ score++; document.getElementById('current-score').innerText=score; hearts.splice(i,1); } if(h.y>310) hearts.splice(i,1); });
        requestAnimationFrame(gameLoop);
    }
    canvas.addEventListener('touchmove', e => { e.preventDefault(); const rect = canvas.getBoundingClientRect(); basketX = e.touches[0].clientX - rect.left; }, {passive: false});
    canvas.addEventListener('mousemove', e => { const rect = canvas.getBoundingClientRect(); basketX = e.clientX - rect.left; });

    function shareScore() { database.ref("messages").push().set({ sender: "SISTEM", text: `🎮 ${document.getElementById('user-role').value} menang tangkap ${score} hati! 🐱❤️`, type: 'system' }); showSection('sec-home', document.querySelector('.nav-item')); }

    setInterval(() => {
        const wita = new Date().toLocaleTimeString('id-ID', { timeZone: 'Asia/Makassar' });
        document.getElementById('clock-wahyu').innerText = wita; document.getElementById('clock-rinol').innerText = wita;
        const diff = new Date("July 31, 2026").getTime() - new Date().getTime();
        const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
        document.getElementById('timer-full').innerText = `${d} Hari ${h}:${m}:${s}`;
    }, 1000);
</script>
</body>
</html>
