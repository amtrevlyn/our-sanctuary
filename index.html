<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Sanctuary | Wahyu & Rinol 🌸</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --pink: #fb6f92; --matcha: #81c784; --bg: #fdf2f8; --deep-pink: #d63384; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #ffc2d1, #e8f5e9); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        
        .container { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 25px; border-radius: 30px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; border: 3px solid white; position: relative; z-index: 10; }
        
        /* Floating Decorations */
        .deco { position: fixed; font-size: 25px; pointer-events: none; z-index: 1; animation: floatAnim 6s infinite ease-in-out; opacity: 0.6; }
        @keyframes floatAnim { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(20deg); } }

        h1 { color: var(--deep-pink); margin: 0; font-size: 1.6rem; text-shadow: 2px 2px white; }
        .status-card { background: white; border-radius: 20px; padding: 15px; margin: 15px 0; border: 1px solid #eee; }
        .time { font-size: 1.2rem; font-weight: bold; color: #333; }
        .countdown { background: var(--pink); color: white; padding: 10px; border-radius: 15px; font-weight: bold; font-size: 0.85rem; margin-top: 10px; }

        /* Chat System */
        #chat-box { height: 180px; overflow-y: auto; border: 1px solid #eee; padding: 12px; border-radius: 20px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; background: rgba(255,255,255,0.5); }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 75%; font-size: 0.85rem; line-height: 1.4; }
        .msg.wahyu { align-self: flex-start; background: #ffe4e8; border-bottom-left-radius: 0; text-align: left; }
        .msg.rinol { align-self: flex-end; background: #e8f5e9; border-bottom-right-radius: 0; text-align: right; }
        .msg.sticker { font-size: 2.5rem; background: none !important; box-shadow: none !important; }

        /* Sticker Panel */
        .sticker-panel { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .sticker-btn { font-size: 1.8rem; cursor: pointer; transition: 0.2s; border: none; background: none; }
        .sticker-btn:hover { transform: scale(1.3); }

        .input-area { display: flex; gap: 5px; margin-bottom: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #ddd; outline: none; }
        .btn { border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-send { background: var(--pink); color: white; padding: 0 15px; }
        .btn-kangen { background: #ff85a2; color: white; width: 100%; padding: 10px; margin-bottom: 8px; }
        .btn-hug { background: white; color: var(--pink); border: 2px solid var(--pink); width: 100%; padding: 10px; border-radius: 50px; }

        /* Music Box */
        .music-box { margin-top: 20px; background: white; padding: 10px; border-radius: 20px; border: 1px solid #ddd; }
        iframe { border-radius: 15px; width: 100%; height: 60px; }

        @keyframes floatUp { to { transform: translateY(-120vh); opacity: 0; } }
    </style>
</head>
<body>

<div class="deco" style="top:10%; left:5%;">🐱</div>
<div class="deco" style="top:25%; right:10%; animation-delay: 2s;">🌸</div>
<div class="deco" style="bottom:20%; left:10%; animation-delay: 4s;">🧀</div>

<div class="container">
    <h1>Our Sanctuary 🌸</h1>
    
    <div class="status-card">
        <div style="display:flex; justify-content: space-around;">
            <div><small>Wahyu</small><div id="clock1" class="time">00:00</div></div>
            <div><small>Rinol</small><div id="clock2" class="time">00:00</div></div>
        </div>
        <div class="countdown" id="timer">Memuat hari...</div>
    </div>

    <select id="user-role" style="width:100%; padding:8px; border-radius:10px; border:1px solid var(--pink); margin-bottom:10px;">
        <option value="Wahyu">Aku Wahyu</option>
        <option value="Rinol">Aku Rinol</option>
    </select>

    <div id="chat-box"></div>

    <div class="sticker-panel">
        <button class="sticker-btn" onclick="sendSticker('🐱')">🐱</button>
        <button class="sticker-btn" onclick="sendSticker('🌸')">🌸</button>
        <button class="sticker-btn" onclick="sendSticker('🧀')">🧀</button>
        <button class="sticker-btn" onclick="sendSticker('🍵')">🍵</button>
        <button class="sticker-btn" onclick="sendSticker('🥺')">🥺</button>
    </div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Ketik sesuatu...">
        <button class="btn btn-send" onclick="sendMessage()">Kirim</button>
    </div>

    <button class="btn btn-kangen" onclick="sendKangen()">Lagi Kangen Berat 🥺</button>
    <button class="btn btn-hug" onclick="spawnHearts()">Kirim Pelukan ❤️</button>

    <div class="music-box">
        <p style="font-size: 0.7rem; margin-bottom: 5px;">🎵 Lagu Buat Kita</p>
        <iframe src="https://www.youtube.com/embed/videoseries?list=PL4fGSI1pDJn6jWnvWbcL6vX-G-7z_A6I6&autoplay=0" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCTR3QhEHG4lgU_1N4RWNDIZ_GCb5FUw_Q",
        authDomain: "yurin-e2687.firebaseapp.com",
        databaseURL: "https://yurin-e2687-default-rtdb.firebaseio.com",
        projectId: "yurin-e2687",
        storageBucket: "yurin-e2687.firebasestorage.app",
        messagingSenderId: "105255547339",
        appId: "1:105255547339:web:5e6a3f53a5c8056000064e"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function updateDashboard() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('clock1').innerText = timeStr;
        document.getElementById('clock2').innerText = timeStr;
        const target = new Date("July 31, 2026 00:00:00").getTime();
        const diff = target - now.getTime();
        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('timer').innerText = `${d} Hari Menuju Berau ✈️`;
    }
    setInterval(updateDashboard, 1000); updateDashboard();

    function sendMessage() {
        const user = document.getElementById('user-role').value;
        const text = document.getElementById('msg-input').value;
        if(text.trim() !== "") {
            database.ref("messages").push().set({ sender: user, text: text, type: 'text' });
            document.getElementById('msg-input').value = "";
        }
    }

    function sendSticker(emoji) {
        const user = document.getElementById('user-role').value;
        database.ref("messages").push().set({ sender: user, text: emoji, type: 'sticker' });
    }

    function sendKangen() {
        const user = document.getElementById('user-role').value;
        database.ref("messages").push().set({ sender: "SISTEM", text: `💖 ${user} LAGI KANGEN BANGET! 🥺`, type: 'text' });
    }

    database.ref("messages").limitToLast(10).on("value", (snap) => {
        const chatBox = document.getElementById('chat-box'); chatBox.innerHTML = "";
        snap.forEach((child) => {
            const data = child.val();
            const div = document.createElement("div");
            div.className = `msg ${data.sender.toLowerCase()} ${data.type === 'sticker' ? 'sticker' : ''}`;
            div.innerHTML = data.type === 'text' ? `<small style="display:block; font-size:0.5rem; opacity:0.5">${data.sender}</small>${data.text}` : data.text;
            chatBox.appendChild(div);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    function spawnHearts() {
        for(let i=0; i<15; i++) {
            const h = document.createElement('div'); h.className = 'deco'; h.innerText = '❤️';
            h.style.left = Math.random() * 100 + 'vw'; h.style.top = '100vh';
            h.style.animation = 'floatUp 3s forwards';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 3000);
        }
    }
    document.getElementById('msg-input').addEventListener("keyup", (e) => { if(e.key === "Enter") sendMessage(); });
</script>
</body>
</html>
